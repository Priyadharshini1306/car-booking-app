# =====================================================
# application-docker.properties
# =====================================================
# Used when SPRING_PROFILES_ACTIVE=docker is set.
# All ${VAR} values come from docker-compose.yml.
# =====================================================

server.port=8080

# Database — db host refers to the MySQL container
# "db" is the service name in docker-compose.yml
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# FIX: Use MySQLDialect (not MySQL8Dialect) for
# compatibility with Spring Boot 3 + Hibernate 6.
# MySQL8Dialect was removed in Hibernate 6.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — must match docker-compose JWT_SECRET
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Admin email for system alert emails
admin.email=${ADMIN_EMAIL}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.com.carbooking=INFO